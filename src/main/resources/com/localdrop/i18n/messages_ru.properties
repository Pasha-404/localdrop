dialogs.help.title=Справка
dialogs.help.header=Как пользоваться LocalDrop
dialogs.help.content=1. Дождитесь появления другого устройства LocalDrop в списке доступных устройств.\n2. Перетащите файлы или папки в центральную область или используйте «Добавить файлы» / «Добавить папку».\n3. Выберите устройство и нажмите «Отправить».\n4. Полученные файлы сохраняются в выбранную папку.\n\nLocalDrop работает только внутри локальной сети и только пока приложение запущено на обоих устройствах.
dialogs.about.title=О программе
dialogs.about.header=LocalDrop
dialogs.about.content=LocalDrop v2.0.0\nПередача файлов по локальной сети\n\nJavaFX-приложение для отправки и приёма файлов внутри одной LAN.

