dialogs.help.title=Help
dialogs.help.header=How to use LocalDrop
dialogs.help.content=1. Wait for another LocalDrop device to appear in Available devices.\n2. Drag files or folders into the center panel, or use Add files / Add folder.\n3. Select a target device and click Send.\n4. Received files are saved into the selected Save folder.\n\nLocalDrop works only inside your local network and only while the app is running on both devices.
dialogs.about.title=About
dialogs.about.header=LocalDrop
dialogs.about.content=LocalDrop v2.1.0\nLocal network file transfer\n\nJavaFX app for sending and receiving files inside the same LAN.

