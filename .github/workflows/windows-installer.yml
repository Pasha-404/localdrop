name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build application
        run: .\gradlew.bat build

      - name: Build Windows installer
        run: .\gradlew.bat packageInstaller

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "build/installer/*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found in build/installer"
          }
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: localdrop-windows-installer-${{ github.ref_name }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          INSTALLER_PATH: ${{ steps.installer.outputs.path }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME $env:INSTALLER_PATH --title $env:TAG_NAME --generate-notes
          }
          else {
            gh release upload $env:TAG_NAME $env:INSTALLER_PATH --clobber
          }
